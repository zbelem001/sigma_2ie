<header class="fixed top-0 right-0 w-[calc(100%-240px)] flex justify-between items-center px-8 h-16 z-40 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200/50 dark:border-slate-800/50 shadow-sm dark:shadow-none transition-all duration-300">
  <div class="flex items-center gap-6">
    <span class="font-manrope text-sm text-slate-400">{{ breadcrumb.join(' / ') }}</span>
    <div class="relative flex items-center group">
      <span class="material-symbols-outlined absolute left-3 text-slate-400 text-lg">search</span>
      <input class="bg-surface-container-low border-none rounded-full pl-10 pr-4 py-1.5 text-sm w-64 focus:ring-2 focus:ring-primary transition-all" [placeholder]="searchPlaceholder" type="text" />
    </div>
  </div>
  <div class="flex items-center gap-5">
    <button class="text-slate-400 hover:text-[#001E40] transition-colors relative">
      <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
      <span class="absolute top-0 right-0 w-2 h-2 bg-error rounded-full border-2 border-white"></span>
    </button>
    <button class="text-slate-400 hover:text-[#001E40] transition-colors">
      <span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
    </button>
    <div class="h-8 w-px bg-slate-200 mx-2"></div>
    <div class="flex items-center gap-3">
      <div class="text-right">
        <p class="text-xs font-bold text-primary font-headline">{{ userName }}</p>
        <p class="text-[10px] text-slate-500 uppercase tracking-tighter">{{ userDepartment }}</p>
      </div>
      <img alt="{{ userName }}" class="w-9 h-9 rounded-full object-cover ring-2 ring-primary-container/20" [src]="userAvatar" />
    </div>
  </div>
</header>
