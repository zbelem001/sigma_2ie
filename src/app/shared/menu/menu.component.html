<aside class="fixed left-0 top-0 h-screen w-[240px] transition-all duration-300 bg-[#1A3F6F] dark:bg-slate-900 shadow-xl dark:shadow-none flex flex-col h-full z-50">
  <div class="p-6 flex items-center gap-3">
    <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center">
      <span class="material-symbols-outlined text-white" data-icon="account_balance">account_balance</span>
    </div>
    <div>
      <h1 class="text-white text-xl font-bold tracking-tight">G-PROM</h1>
      <p class="text-white/60 text-[10px] uppercase tracking-widest font-semibold">Public Procurement</p>
    </div>
  </div>
  <nav class="mt-4 flex-1">
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center px-6 py-3 text-white/70 hover:bg-white/5 transition-colors transition-transform scale-95 active:scale-90">
      <span class="material-symbols-outlined mr-3" data-icon="dashboard">dashboard</span>
      <span class="uppercase tracking-wider text-[10px] font-semibold">Dashboard</span>
    </a>
    <a routerLink="/marches" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center px-6 py-3 text-white/70 hover:bg-white/5 transition-colors transition-transform scale-95 active:scale-90">
      <span class="material-symbols-outlined mr-3" data-icon="gavel">gavel</span>
      <span class="uppercase tracking-wider text-[10px] font-semibold">Marchés</span>
    </a>
    <a routerLink="/fournisseurs" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center px-6 py-3 text-white/70 hover:bg-white/5 transition-colors transition-transform scale-95 active:scale-90">
      <span class="material-symbols-outlined mr-3" data-icon="groups">groups</span>
      <span class="uppercase tracking-wider text-[10px] font-semibold">Fournisseurs</span>
    </a>
    <a routerLink="/transformation" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center px-6 py-3 text-white/70 hover:bg-white/5 transition-colors transition-transform scale-95 active:scale-90">
      <span class="material-symbols-outlined mr-3" data-icon="account_tree">account_tree</span>
      <span class="uppercase tracking-wider text-[10px] font-semibold">Transformer BDD</span>
    </a>
    <a class="flex items-center px-6 py-3 text-white/70 hover:bg-white/5 transition-colors transition-transform scale-95 active:scale-90 mt-auto" href="#">
      <span class="material-symbols-outlined mr-3" data-icon="settings">settings</span>
      <span class="uppercase tracking-wider text-[10px] font-semibold">Paramètres</span>
    </a>
  </nav>
</aside>
