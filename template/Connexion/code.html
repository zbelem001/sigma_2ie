<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | 2iE Procurement Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "brand-dark": "#161d26",
                        "brand-yellow": "#fbc02d",
                        "brand-grey": "#424242",
                        "field-bg": "#848a91",
                        "surface-dim": "#d9dadb",
                        "primary-fixed-dim": "#a7c8ff",
                        "on-primary-fixed-variant": "#1f477b",
                        "on-background": "#191c1d",
                        "surface-tint": "#3a5f94",
                        "tertiary-fixed-dim": "#ffb690",
                        "outline": "#737780",
                        "on-secondary-container": "#58657c",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#d6e3fe",
                        "on-surface-variant": "#43474f",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#723610",
                        "on-tertiary-fixed": "#341100",
                        "surface-container-low": "#f3f4f5",
                        "on-error-container": "#93000a",
                        "primary-container": "#003366",
                        "on-surface": "#191c1d",
                        "on-primary-container": "#799dd6",
                        "secondary": "#525f75",
                        "secondary-fixed-dim": "#bac7e1",
                        "outline-variant": "#c3c6d1",
                        "inverse-on-surface": "#f0f1f2",
                        "primary-fixed": "#d5e3ff",
                        "primary": "#001e40",
                        "tertiary-container": "#592300",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "on-secondary-fixed-variant": "#3b475d",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001b3c",
                        "secondary-fixed": "#d6e3fe",
                        "background": "#535353",
                        "surface": "#f8f9fa",
                        "tertiary-fixed": "#ffdbca",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "on-secondary-fixed": "#0f1c2f",
                        "inverse-primary": "#a7c8ff",
                        "on-error": "#ffffff",
                        "tertiary": "#381300",
                        "surface-container": "#edeeef",
                        "surface-bright": "#f8f9fa",
                        "on-tertiary-container": "#d8885c",
                        "surface-variant": "#e1e3e4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #535353;
        }
        .login-card-shadow {
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .header-gradient {
            background: linear-gradient(135deg, #fbc02d 0%, #f9a825 100%);
        }
        .header-stripe {
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 50%, transparent 50%);
        }
        input::placeholder {
            color: #d1d5db;
            opacity: 0.8;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center selection:bg-brand-yellow selection:text-brand-dark">
<!-- Logo subtle positioning -->
<div class="mb-10 flex flex-col items-center gap-2 opacity-80">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<span class="text-xl font-bold tracking-widest text-white/50">2iE INSTITUT</span>
</div>
<main class="w-full max-w-lg px-4">
<div class="bg-brand-dark overflow-hidden login-card-shadow">
<!-- Header Section -->
<div class="header-gradient h-24 relative flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 header-stripe"></div>
<h2 class="relative z-10 text-2xl md:text-3xl font-normal text-brand-dark tracking-[0.1em] uppercase">Connexion Agent</h2>
</div>
<!-- Form Section -->
<form class="p-8 md:p-12 space-y-8">
<!-- Username Field -->
<div class="flex items-center gap-6">
<div class="flex-shrink-0">
<span class="material-symbols-outlined text-field-bg text-3xl" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div class="flex-grow">
<input class="w-full bg-field-bg border-none py-3 px-4 text-white focus:ring-1 focus:ring-brand-yellow outline-none placeholder:text-gray-200" placeholder="Username" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex items-center gap-6">
<div class="flex-shrink-0">
<span class="material-symbols-outlined text-field-bg text-3xl" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<div class="flex-grow">
<input class="w-full bg-field-bg border-none py-3 px-4 text-white focus:ring-1 focus:ring-brand-yellow outline-none placeholder:text-gray-200" placeholder="Password" type="password"/>
</div>
</div>
<!-- Footer Actions within Dark Area -->
<div class="flex items-center justify-between pt-4">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 bg-field-bg border-none text-brand-yellow focus:ring-0 focus:ring-offset-0" type="checkbox"/>
<span class="absolute text-brand-dark opacity-0 peer-checked:opacity-100 material-symbols-outlined text-sm font-bold pointer-events-none">check</span>
</div>
<span class="text-sm font-medium text-field-bg group-hover:text-white transition-colors">Remember me</span>
</label>
<button class="bg-[#ced4da] hover:bg-white text-brand-dark font-bold px-10 py-3 uppercase tracking-widest text-sm transition-colors shadow-sm" type="submit">
                        Login
                    </button>
</div>
</form>
</div>
<div class="mt-8 text-center">
<p class="text-white/40 text-xs font-medium tracking-wider">Copyright © 2024 2iE Procurement Management</p>
<div class="mt-4 flex justify-center gap-4 text-[10px] uppercase tracking-[0.2em] text-white/30">
<a class="hover:text-white transition-colors" href="#">Privacy</a>
<span>•</span>
<a class="hover:text-white transition-colors" href="#">Terms</a>
<span>•</span>
<a class="hover:text-white transition-colors" href="#">Help</a>
</div>
</div>
</main>
<!-- Visual Background Element -->
<div class="fixed top-0 right-0 w-1/2 h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-1/4 -right-1/4 w-[800px] h-[800px] bg-black/10 rounded-full blur-[120px]"></div>
</div>
</body></html>
